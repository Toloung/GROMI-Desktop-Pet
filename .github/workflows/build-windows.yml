name: Build Windows EXE

on:
  push:
    branches:
      - main
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build executable
        run: >
          python -m PyInstaller
          --noconfirm
          --clean
          --onefile
          --windowed
          --name "GROMI桌面宠物"
          --icon "gromi.ico"
          --add-data "gromi_spritesheet.webp;."
          --hidden-import pystray._win32
          gromi_desktop_pet.py

      - name: Prepare release asset
        shell: pwsh
        run: Copy-Item -LiteralPath "dist/GROMI桌面宠物.exe" -Destination "dist/GROMI.exe" -Force

      - name: Upload executable
        uses: actions/upload-artifact@v7
        with:
          name: GROMI-Desktop-Pet-Windows
          path: dist/GROMI.exe
          retention-days: 14

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v3
        with:
          files: dist/GROMI.exe
          name: GROMI 桌面宠物 ${{ github.ref_name }}
          body: |
            GROMI 桌面宠物自动发布版本。

            本项目仅用于个人娱乐和功能测试。
